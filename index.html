<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- ▼▼ 페이지마다 수정하는 값 (여기만 수정) ▼▼ -->
  <meta property="og:title" content="2026년 6월 카카오페이 프로모션">
  <meta property="og:description" content="피카PC방에서 카카오페이 첫 결제하면 500원 즉시 할인!">
  <meta property="og:url" content="https://ics.mediaweb.co.kr/_event/20260601_kakaopay/index.html">
  <meta property="og:image" content="assets/Thumbnail_800x400.jpg">
  <meta name="twitter:image" content="assets/Thumbnail_1200x630.jpg">
  <!-- og:image과 twitter:image 주소는 절대경로로 이미지 시안 확정 후 배포 전 반드시 교체해주세요. (상대경로 입력 시 공유 시 이미지가 깨지는 현상 발생) -->
  <!-- ▲▲ 페이지마다 수정하는 값 ▲▲ -->

  <!-- title / description / twitter 태그는 아래 스크립트가 og: 값을 읽어서 자동으로 채움 -->
  <script>
    (function () {
      var g = function (p) { return document.querySelector('meta[property="og:' + p + '"]').content; };
      document.title = g('title');
      [['name', 'description', g('description')],
      ['name', 'twitter:card', 'summary_large_image'],
      ['name', 'twitter:title', g('title')],
      ['name', 'twitter:description', g('description')],
      ['name', 'twitter:url', g('url')]
      ].forEach(function (m) {
        var el = document.createElement('meta');
        el.setAttribute(m[0], m[1]); el.content = m[2];
        document.head.appendChild(el);
      });
    })();
  </script>

  <meta name="keywords" content="카카오페이 이벤트, 카카오페이 첫결제 할인, 카카오페이 할인, 피카피시방 할인, 피카피시방 카카오페이">
  <meta name="author" content="Mediaweb">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="피카PC방 2026년 6월 카카오페이 프로모션">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Asta+Sans:wght@400;500;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
    rel="stylesheet">
  <!-- Asta Sans: 굵기 300~800 지원 (900 없음 → 브라우저가 800으로 자동 대체)
       Noto Sans KR: Asta Sans 미지원 글자 fallback                          -->

  <!-- css -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/favicon.png">

  <!-- 카카오 JavaScript SDK (카카오톡 공유용) -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" crossorigin="anonymous"></script>
</head>

<body>
  <div id="wrapper">

    <!-- ============================================
         배경 코인 (패럴렉스) — 스크린리더 무시
    ============================================ -->
    <div class="bg-coins" aria-hidden="true">
      <!-- sec01 영역 -->
      <img class="coin coin--1"  data-speed="0.70" src="assets/kakaocoin8.png" alt="">
      <img class="coin coin--2"  data-speed="0.45" src="assets/kakaocoin4.png" alt="">
      <img class="coin coin--3"  data-speed="0.30" src="assets/kakaocoin7.png" alt="">
      <!-- sec01 → sec02 -->
      <img class="coin coin--4"  data-speed="0.55" src="assets/kakaocoin3.png" alt="">
      <img class="coin coin--5"  data-speed="0.35" src="assets/kakaocoin5.png" alt="">
      <!-- sec02 영역 -->
      <img class="coin coin--6"  data-speed="0.65" src="assets/kakaocoin8.png" alt="">
      <img class="coin coin--7"  data-speed="0.40" src="assets/kakaocoin4.png" alt="">
      <img class="coin coin--8"  data-speed="0.70" src="assets/kakaocoin7.png" alt="">
      <!-- sec02 → sec03 -->
      <img class="coin coin--9"  data-speed="0.50" src="assets/kakaocoin3.png" alt="">
      <img class="coin coin--10" data-speed="0.32" src="assets/kakaocoin5.png" alt="">
      <!-- sec03 영역 -->
      <img class="coin coin--11" data-speed="0.60" src="assets/kakaocoin8.png" alt="">
      <img class="coin coin--12" data-speed="0.42" src="assets/kakaocoin4.png" alt="">
      <!-- sec04 영역 -->
      <img class="coin coin--13" data-speed="0.58" src="assets/kakaocoin7.png" alt="">
    </div>

    <!-- ============================================
         메인 콘텐츠
    ============================================ -->
    <main id="main">
      <!-- ============================================
           SEC01 — 타이틀
      ============================================ -->
      <section id="sec01" class="section">

        <!-- 로고 (카카오페이 x 피카PC방) + 헤드 타이틀 -->
        <header class="sec01-header">
          <img
            src="assets/bi.svg"
            alt="카카오페이 X 피카PC방"
            class="bi-logo"
            width="446" height="82"
          >
          <!-- PC용 타이틀 (769px 이상) -->
          <img
            src="assets/head_title_pc.svg"
            alt="6월 카카오페이 이벤트 타이틀"
            class="head-title head-title--pc"
            width="927" height="271"
          >
          <!-- 모바일용 타이틀 (768px 이하) -->
          <img
            src="assets/head_title_mo.svg"
            alt="6월 카카오페이 이벤트 타이틀"
            class="head-title head-title--mo"
            width="960" height="511"
          >
        </header>

        <!-- 키비주얼 -->
        <div class="sec01-kv">
          <img
            src="assets/kv_hero.png"
            alt=""
            class="kv-hero"
            width="900" height="600"
            loading="eager"
          >
        </div>

      </section>
      <!-- ============================================
           SEC02 — 이벤트 내용
      ============================================ -->
      <section id="sec02" class="section">
        <div class="sec02-inner">
          <ul class="event-list">

            <!-- 기간 -->
            <li class="event-item">
              <span class="event-badge">기간</span>
              <div class="event-content">
                <p class="event-desc">2026. 06. 01(월) ~ 2026. 06. 30(화)</p>
                <p class="event-note">※ 예산 소진 시 조기종료</p>
              </div>
            </li>

            <!-- 대상 -->
            <li class="event-item">
              <span class="event-badge">대상</span>
              <div class="event-content">
                <p class="event-desc">피카PC방 카카오페이 첫 결제 고객</p>
                <p class="event-note event-note--red">※ 기존 PC방 카카오페이 결제 이력이 없는 고객 대상</p>
              </div>
            </li>

            <!-- 혜택 -->
            <li class="event-item">
              <span class="event-badge">혜택</span>
              <div class="event-content">
                <p class="event-desc">카카오페이 가맹 피카PC방에서<br>카카오페이머니로 5천원 이상 결제 시</p>
                <div class="event-benefit">
                  <span class="event-highlight">선착순 500원 즉시 할인!</span>
                  <span class="event-note">(기간 내 1인 1회)</span>
                </div>
              </div>
            </li>

          </ul>
        </div>
      </section>
      <section id="sec03" class="section"><!-- 참여방법 --></section>
      <section id="sec04" class="section"><!-- 유의사항 --></section>
    </main>

  </div><!-- /#wrapper -->

  <script src="script.js"></script>
</body>
</html>
